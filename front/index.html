<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>스마트 매니지먼트 플래너</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <header>
            <div class="brand">스마트 플래너 <span id="sync-status">서버 확인 중...</span></div>
            <div class="header-info">
                <div class="info-group">날씨: <span id="weather-display">-</span></div>
                <div class="info-group">날짜: <span id="current-date-display">-</span></div>
            </div>
        </header>
        <div class="main-container">
            <aside class="sidebar card">
                <div class="sidebar-header">보관함</div>
                <input type="text" id="todo-input" class="main-input" placeholder="할 일 입력 후 엔터">
                <div class="category-selectors">
                    <button onclick="addWithCategory('daily')" class="cat-btn daily-btn">오늘</button>
                    <button onclick="addWithCategory('weekly')" class="cat-btn weekly-btn">주간</button>
                    <button onclick="addWithCategory('monthly')" class="cat-btn monthly-btn">월간</button>
                </div>
                <div id="inbox-list" class="scroll-area inbox-area" ondrop="drop(event, 'inbox')" ondragover="allowDrop(event)"></div>
                <div class="sidebar-extra">
                    <div class="extra-item">다짐: <input type="text" id="daily-motto" onchange="syncExtra()"></div>
                    <div class="extra-item">메모: <textarea id="quick-memo" onchange="syncExtra()"></textarea></div>
                </div>
                <div class="trash-area" ondrop="dropToTrash(event)" ondragover="allowDrop(event)">삭제 (드래그)</div>
            </aside>
            <main class="planner-grid">
                <section class="planner-column" ondrop="drop(event, 'daily')" ondragover="allowDrop(event)">
                    <div class="column-header">오늘 <span id="daily-count">0</span></div>
                    <div id="daily-list" class="scroll-area"></div>
                </section>
                <section class="planner-column" ondrop="drop(event, 'weekly')" ondragover="allowDrop(event)">
                    <div class="column-header">주간 <span id="weekly-count">0</span></div>
                    <div id="weekly-list" class="scroll-area"></div>
                </section>
                <section class="planner-column" ondrop="drop(event, 'monthly')" ondragover="allowDrop(event)">
                    <div class="column-header">월간 <span id="monthly-count">0</span></div>
                    <div id="monthly-list" class="scroll-area"></div>
                </section>
            </main>
        </div>
        <footer>
            <div class="footer-item">성취도: <span id="progress-text">0%</span>
                <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            </div>
            <div class="footer-item"><div id="news-display">뉴스를 불러오는 중...</div></div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
